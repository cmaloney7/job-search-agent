name: Job search agent

on:
  schedule:
    - cron: "0 12 * * 2,4,6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run job search agent
        run: |
          set -o pipefail
          claude -p "Run /search to find new job postings, then run /render to update the dashboard." --allowedTools "Bash,Read,Write,Edit" 2>&1 | tee "$RUNNER_TEMP/search-output.log"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Commit results
        run: |
          git config user.name "job-search-agent"
          git config user.email "actions@github.com"
          git add matches.db docs/index.html
          git diff --cached --quiet || git commit -m "Agent run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Send dashboard notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DASHBOARD_EMAIL: ${{ secrets.DASHBOARD_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python notify.py success

      - name: Send failure notification
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DASHBOARD_EMAIL: ${{ secrets.DASHBOARD_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify.py failure
