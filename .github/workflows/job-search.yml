name: Job search agent

on:
  schedule:
    - cron: "0 12 * * 2,4,6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run job search agent
        run: claude -p "Run /search to find new job postings, then run /render to update the dashboard." --allowedTools "Bash,Read,Write,Edit"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Commit results
        run: |
          git config user.name "job-search-agent"
          git config user.email "actions@github.com"
          git add matches.db docs/index.html
          git diff --cached --quiet || git commit -m "Agent run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Send dashboard notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request
          payload = json.dumps({
              "from": "Job Search Agent <onboarding@resend.dev>",
              "to": ["cdmolloy@gmail.com"],
              "subject": "Job search run complete — run #" + os.environ["RUN_NUMBER"],
              "text": (
                  "Your job search agent finished.\n\n"
                  "Dashboard: https://cmaloney7.github.io/job-search-agent/\n\n"
                  "Run details: " + os.environ["RUN_URL"]
              )
          }).encode()
          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=payload,
              headers={
                  "Authorization": "Bearer " + os.environ["RESEND_API_KEY"],
                  "Content-Type": "application/json",
                  "User-Agent": "python-resend/1.0"
              },
              method="POST"
          )
          urllib.request.urlopen(req)
          EOF
